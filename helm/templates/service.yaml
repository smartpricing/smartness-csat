apiVersion: v1
kind: Service
metadata:
  labels:
    run:  {{ .Release.Name }}
  name:  {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  sessionAffinity: ClientIP
  selector:
    run: {{ .Release.Name }}
  ports:
    - name: port-1
      port: {{ .Values.port }}
      protocol: TCP
      targetPort: {{ .Values.port }}
